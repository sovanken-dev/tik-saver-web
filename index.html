<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TikTok Genie - Download TikTok videos, images, and audio without watermark. Fast, free, and easy to use.">
    <meta name="keywords" content="TikTok downloader, download TikTok video, TikTok without watermark, TikTok saver">
    <meta name="author" content="TikTok Genie">
    <meta name="theme-color" content="#ff0050">
    
    <meta property="og:title" content="TikTok Genie - Download TikTok Videos & Images">
    <meta property="og:description" content="Fast, free, and easy - Download your favorite TikTok videos and images without watermark">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TikTok Genie">
    <meta name="twitter:description" content="Download TikTok videos & images without watermark">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <title>TikTok Genie - Download TikTok Videos & Images Without Watermark</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>TikTok Genie</h1>
            </div>
            <p class="subtitle">Your magical TikTok downloader - Save videos, images, and audio without watermark. Fast, free, and easy!</p>
        </header>
        <main class="main-content">
            <section class="search-section" aria-label="Download TikTok media">
                <div class="input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <path d="M9 2a7 7 0 015.726 10.953l4.66 4.66a1 1 0 01-1.414 1.414l-4.66-4.66A7 7 0 119 2zm0 2a5 5 0 100 10A5 5 0 009 4z" fill="currentColor"/>
                    </svg>
                    <input 
                        type="url" 
                        id="urlInput" 
                        class="url-input" 
                        placeholder="Paste TikTok link here..."
                        aria-label="TikTok video URL input"
                        autocomplete="off"
                        spellcheck="false">
                    <button id="clearBtn" class="clear-btn" onclick="clearUrl()" title="Clear URL" aria-label="Clear URL">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="pasteFromClipboard()" title="Paste from clipboard" aria-label="Paste link from clipboard">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M8 2a2 2 0 00-2 2H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2h-1a2 2 0 00-2-2H8zm0 2h4v1H8V4z" fill="currentColor"/>
                        </svg>
                        <span>Paste Link</span>
                    </button>
                    <button id="fetchBtn" class="btn btn-primary" onclick="handleFetch()" disabled title="Get media information" aria-label="Get media information">
                        <span id="fetchBtnText">Get Media</span>
                        <svg id="fetchBtnIcon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M10 3v11m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </section>

            <div id="videoPreview" class="video-preview">
                <div class="preview-card">
                    <div class="preview-media">
                        <div id="videoContainer" class="video-container">
                            <video id="videoPlayer" class="video-player" controls preload="metadata" playsinline>
                                Your browser does not support the video tag.
                            </video>
                        </div>

                        <div id="imageContainer" class="image-container">
                            <div class="image-slider">
                                <button class="slider-btn prev-btn" id="prevBtn" onclick="previousImage()" title="Previous image" aria-label="Previous image">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                                <img id="imagePlayer" class="image-player" alt="TikTok image preview" loading="lazy">
                                <button class="slider-btn next-btn" id="nextBtn" onclick="nextImage()" title="Next image" aria-label="Next image">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                        <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="image-counter" id="imageCounter" role="status" aria-live="polite">
                                <span id="currentImageIndex">1</span> / <span id="totalImages">1</span>
                            </div>
                        </div>

                        <div class="media-type-badge" id="mediaTypeBadge">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right: 4px;">
                                <path d="M15 10l-4 4-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span id="mediaTypeText">Video</span>
                        </div>
                        <div class="duration-badge" id="durationBadge">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="margin-right: 4px;">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                                <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <span id="videoDuration">0:00</span>
                        </div>
                    </div>

                    <div class="preview-info">
                        <h2 id="videoTitle" class="video-title"></h2>
                        <div class="video-meta">
                            <div class="meta-item">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <circle cx="8" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                                    <path d="M3 14a5 5 0 0110 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                                <span id="videoAuthor"></span>
                            </div>
                            <div class="meta-item">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M14 6.667v6.666a1.333 1.333 0 01-1.333 1.334H3.333A1.333 1.333 0 012 13.333V6.667m12 0V4a1.333 1.333 0 00-1.333-1.333H3.333A1.333 1.333 0 002 4v2.667m12 0H2" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                                <span id="videoSize"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="downloadOptions" class="download-options">
                    <button id="downloadVideoBtn" class="btn btn-download-option" onclick="downloadVideo()" title="Download video without watermark" aria-label="Download video">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M10 3v11m0 0l-4-4m4 4l4-4M3 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Download Video</span>
                    </button>

                    <button id="downloadAudioBtn" class="btn btn-download-option btn-secondary-option" onclick="downloadAudio()" title="Download audio as MP3" aria-label="Download audio as MP3">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M15 8v6a2 2 0 01-2 2H7a2 2 0 01-2-2V8m10 0V5a2 2 0 00-2-2H7a2 2 0 00-2 2v3m10 0H5m5-2v8m0 0l-3-3m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Download Audio (MP3)</span>
                    </button>

                    <button id="downloadImagesBtn" class="btn btn-download-option hidden" onclick="downloadImages()" title="Download all images" aria-label="Download images">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M3 16l4-4 3 3 6-6m0 0v4m0-4h-4M4 4h12a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Download Images</span>
                    </button>
                </div>
            </div>

            <div id="loadingState" class="loading-state" role="status" aria-live="polite">
                <div class="spinner" aria-hidden="true"></div>
                <p>Fetching media details...</p>
            </div>

            <div id="downloadProgress" class="download-progress" role="status" aria-live="polite">
                <div class="progress-header">
                    <span>Downloading...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar" role="progressbar" aria-label="Download progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p class="progress-info" id="progressInfo">Preparing download...</p>
            </div>

            <div id="statusMessage" class="status-message" role="alert" aria-live="assertive">
                <svg id="statusIcon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 18.333a8.333 8.333 0 100-16.666 8.333 8.333 0 000 16.666z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M7.5 10l2.5 2.5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span id="statusText"></span>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
